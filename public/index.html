<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#2563eb" />
  <title>EOG Practice Portal</title>
  <meta name="description" content="Kid-friendly NC EOG-style Reading & Math practice tests with timer, diagrams, and offline support." />
  <link rel="stylesheet" href="/css/styles.css" />
  <!-- PWA -->
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
  <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="EOG Prep" />
</head>
<body>
  <header class="site-head">
    <a href="#/" id="home-link" class="brand">
      <span class="brand-mark">📝</span>
      <span class="brand-name">EOG Practice Portal</span>
    </a>
    <div class="head-right">
      <button id="reload-btn" class="head-btn" style="display:none" title="Reload to get latest updates">🔄</button>
      <button id="install-btn" class="head-btn" style="display:none">📲 Install</button>
      <button id="results-link" class="head-btn" style="display:none">📊 My Results</button>
      <button id="student-chip" class="student-chip" style="display:none"></button>
      <button id="home-back" class="back-btn" style="display:none">← Back</button>
    </div>
  </header>

  <main id="app" class="app"><!-- views render here --></main>

  <footer class="site-foot">
    <span>Practice makes progress · NC EOG-style Reading &amp; Math</span>
  </footer>

  <script type="module" src="/js/app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => navigator.serviceWorker.register("/sw.js").catch(() => {}));
    }
  </script>
</body>
</html>
